<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daan Zunnenberg</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,500;0,8..60,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fb;
    --card-bg: #0a0e14;
    --green: #3ddc97;
    --green-dim: #1c5c44;
    --red: #e0666f;
    --red-dim: #6b333a;
    --cyan: #55c8e8;
    --amber: #e0a852;
    --text: #f4f6f5;
    --dim: #7c8a8c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 100vh;
  }

  #network {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
  }

  .frame {
    position: relative;
    z-index: 1;
    width: min(78vw, 148vh, 900px);
    aspect-ratio: 1.75 / 1;
    border-radius: clamp(14px, 1.6vw, 22px);
    padding: 2px;
    background: linear-gradient(150deg, rgba(224,168,82,0.95), rgba(224,168,82,0.4) 40%, rgba(0,0,0,0) 60%, rgba(224,168,82,0.55) 100%);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 55px rgba(224,168,82,0.35), 0 0 14px rgba(224,168,82,0.4);
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: clamp(13px, 1.5vw, 21px);
    background: var(--card-bg);
    overflow: hidden;
  }

  .card-bg {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    overflow: hidden;
    z-index: 0;
  }

  #book {
    position: absolute;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
  }

  .scrim {
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(60deg, rgba(6,9,13,1) 0%, rgba(6,9,13,0.98) 30%, rgba(6,9,13,0.9) 48%, rgba(6,9,13,0.6) 62%, rgba(6,9,13,0.24) 80%, rgba(6,9,13,0.12) 100%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 4;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 clamp(22px, 5vw, 56px);
    max-width: 76%;
  }

  .eyebrow {
    font-size: clamp(11px, 1.3vw, 15px);
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cyan);
    margin: 0 0 clamp(8px, 1.3vw, 15px);
  }

  h1 {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 600;
    font-size: clamp(26px, 4.6vw, 48px);
    color: var(--text);
    margin: 0;
    line-height: 1.05;
    letter-spacing: -0.01em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 0.22em;
  }

  .status-underscore {
    color: var(--green);
    font-weight: 700;
    text-shadow: 0 0 8px rgba(61,220,151,0.7);
    animation: blink 1s step-end infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 50% { opacity: 0.1; } }

  .desc {
    font-size: clamp(13px, 1.5vw, 18px);
    line-height: 1.5;
    color: #a9b7b3;
    margin: clamp(12px, 2vw, 22px) 0 clamp(18px, 3vw, 30px);
    font-weight: 400;
  }

  .links {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(8px, 1.3vw, 13px);
    align-self: flex-start;
    width: max-content;
    max-width: 100%;
  }
  .link {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #d7dedc;
    text-decoration: none;
    font-family: inherit;
    font-size: clamp(12.5px, 1.4vw, 15.5px);
    font-weight: 500;
    position: relative;
    padding: clamp(8px, 1.3vw, 11px) clamp(11px, 1.6vw, 15px);
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
  }
  .link:hover {
    border-color: rgba(85,200,232,0.6);
    color: var(--cyan);
    background: rgba(85,200,232,0.1);
  }
  .link svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }

  .site-link {
    align-self: flex-start;
    margin-bottom: clamp(10px, 1.6vw, 16px);
    justify-content: flex-start;
  }
  .site-link svg { width: 16px; height: 16px; stroke: currentColor; flex-shrink: 0; }

  .reveal-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    margin: clamp(10px, 1.8vw, 18px) 0 0;
    cursor: pointer;
    user-select: none;
    color: var(--dim);
    font-size: clamp(10.5px, 1.1vw, 12px);
    font-family: inherit;
  }
  .reveal-toggle .switch {
    position: relative;
    width: 34px;
    height: 19px;
    border-radius: 10px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.2);
    transition: background 0.25s ease, border-color 0.25s ease;
    flex-shrink: 0;
  }
  .reveal-toggle .switch::after {
    content: "";
    position: absolute;
    top: 1px; left: 1px;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #d7dedc;
    transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.25s ease;
  }
  .reveal-toggle input {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }
  .reveal-toggle input:checked ~ .switch {
    background: rgba(85,200,232,0.35);
    border-color: rgba(85,200,232,0.7);
  }
  .reveal-toggle input:checked ~ .switch::after {
    transform: translateX(15px);
    background: var(--cyan);
  }
  .reveal-toggle:hover { color: #a9b7b3; }

  .label-text {
    display: inline-block;
    transition: opacity 0.18s ease;
  }
  .label-text.swapping { opacity: 0; }

  .toast {
    position: absolute;
    top: -28px; left: 50%;
    transform: translate(-50%, 6px);
    font-size: 10px;
    color: var(--card-bg);
    background: var(--green);
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease, transform 0.15s ease;
    font-weight: 600;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  @media (max-width: 640px), (max-aspect-ratio: 3/4), (max-height: 500px) and (orientation: landscape) {
    body { align-items: flex-start; padding: 16px 0 24px; }
    .frame {
      width: min(92vw, 78vh, 460px);
      aspect-ratio: auto;
      height: min(560px, 82vh);
      background: linear-gradient(150deg, rgba(224,168,82,0.95), rgba(224,168,82,0.45) 10%, rgba(0,0,0,0) 22%);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 45px rgba(224,168,82,0.3), 0 0 12px rgba(224,168,82,0.35);
    }
    .scrim { background: rgba(10, 14, 20, 0.4); }
    .content {
      position: absolute;
      top: 0; left: 0; right: 0;
      min-height: 68%;
      height: auto;
      justify-content: center;
      max-width: 100%;
      padding: clamp(20px, 6vw, 32px);
      background: linear-gradient(180deg, var(--card-bg) 0%, var(--card-bg) 55%, rgba(10,14,20,0.75) 72%, rgba(10,14,20,0.35) 86%, rgba(10,14,20,0) 100%);
    }
    h1 {
      white-space: normal;
      font-size: clamp(24px, 8vw, 34px);
    }
    .desc { margin: clamp(10px, 3vw, 16px) 0 clamp(16px, 4vw, 22px); }
    .links { width: 100%; }
    .link { background: rgba(10,14,20,0.85); }
    .site-link { width: 100% !important; }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    .content { padding: clamp(12px, 3vh, 20px) clamp(16px, 4vw, 24px); gap: 0; }
    .eyebrow { margin: 0 0 clamp(4px, 1vh, 8px); font-size: 10px; }
    h1 { font-size: clamp(18px, 5.4vh, 26px); }
    .desc { margin: clamp(4px, 1.4vh, 10px) 0 clamp(8px, 2vh, 14px); font-size: 12px; }
    .links { gap: 6px; }
    .link { padding: 6px 9px; font-size: 11px; }
    .link svg { width: 13px; height: 13px; }
    .site-link { margin-bottom: clamp(6px, 1.4vh, 10px); }
  }
</style>
</head>
<body>

<canvas id="network"></canvas>

<div class="frame">
  <div class="card">
    <div class="card-bg">
      <canvas id="book"></canvas>
      <div class="scrim"></div>
    </div>

    <div class="content">
      <p class="eyebrow">Math PhD &middot; Quant Finance</p>
      <h1>Daan Zunnenberg<span class="status-underscore">_</span></h1>
      <p class="desc">Probability, market-making &amp; HFT.</p>

      <a class="link site-link" id="site-link" href="https://daanzunnenberg.com/" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
        <span class="label-text" data-short="Personal Website" data-long="daanzunnenberg.com">Personal Website</span>
      </a>

      <div class="links">
        <button type="button" class="link" id="email-link" data-u="dw.zunnenberg" data-d="gmail.com">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="m4 6 8 7 8-7"/></svg>
          <span class="label-text" data-short="Email" data-long="dw.zunnenberg@gmail.com">Email</span>
          <span class="toast" id="toast">Copied</span>
        </button>
        <a class="link" href="https://github.com/DaanZunnenberg" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/></svg>
          <span class="label-text" data-short="GitHub" data-long="github.com/DaanZunnenberg">GitHub</span>
        </a>
        <a class="link" href="https://www.linkedin.com/in/daanzunnenberg/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 11v5M8 8v.01M12 16v-3a2 2 0 0 1 4 0v3M12 13v3"/></svg>
          <span class="label-text" data-short="LinkedIn" data-long="linkedin.com/in/daanzunnenberg">LinkedIn</span>
        </a>
        <a class="link" href="https://scholar.google.com/citations?user=JLg2KjEAAAAJ" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 4 2 10l10 6 10-6Z"/><path d="M6 12.5V17c0 1.5 2.7 3 6 3s6-1.5 6-3v-4.5"/></svg>
          <span class="label-text" data-short="Scholar" data-long="scholar.google.com/citations?user=JLg2KjEAAAAJ">Scholar</span>
        </a>
      </div>

      <label class="reveal-toggle">
        <input type="checkbox" id="reveal-checkbox">
        <span class="switch"></span>
        <span id="reveal-label">Show full links</span>
      </label>
    </div>
  </div>
</div>

<script>
  // ---- seeded PRNG so the starting numbers are the same on every refresh ----
  (function () {
    let seed = 0x2f6e2b1;
    function mulberry32() {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    Math.random = mulberry32;
  })();

  // ---- copy to clipboard ----
  const emailLink = document.getElementById('email-link');
  const toast = document.getElementById('toast');
  emailLink.addEventListener('click', async (e) => {
    e.preventDefault();
    const text = emailLink.dataset.u + '@' + emailLink.dataset.d;
    try { await navigator.clipboard.writeText(text); }
    catch (err) {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    }
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1300);
  });

  // ---- reveal toggle: crossfade each label between its short (icon-style)
  // text and its full contact-detail text, then re-sync the site-link width
  // once the new (likely wider) labels have settled. ----
  const revealCheckbox = document.getElementById('reveal-checkbox');
  const revealLabel = document.getElementById('reveal-label');
  const labelTexts = document.querySelectorAll('.label-text');
  revealCheckbox.addEventListener('change', () => {
    const revealed = revealCheckbox.checked;
    revealLabel.textContent = revealed ? 'Show short labels' : 'Show full links';
    labelTexts.forEach((el) => {
      el.classList.add('swapping');
      setTimeout(() => {
        el.textContent = revealed ? el.dataset.long : el.dataset.short;
        el.classList.remove('swapping');
        syncSiteLinkWidth();
      }, 180);
    });
  });

  // ---- keep the website link's width matched to the icon-link row below,
  // so it "extends" but stops exactly where the last icon pill stops ----
  const siteLinkEl = document.getElementById('site-link');
  const linksRowEl = document.querySelector('.links');
  function syncSiteLinkWidth() {
    siteLinkEl.style.width = linksRowEl.getBoundingClientRect().width + 'px';
  }
  window.addEventListener('resize', syncSiteLinkWidth);
  window.addEventListener('load', syncSiteLinkWidth);
  syncSiteLinkWidth();

  // ---- background, ported directly from the homepage's
  // orderflow-ladder.js: a DOM ladder fused with order flow — resting book
  // size either side of mid (FLOW / BID / PRICE / ASK / CVD columns), same
  // heat scale, same header/column-header treatment, same POC box — driven
  // by synthetic (offline) data instead of Binance depth/aggTrade sockets. ----
  const canvas = document.getElementById('book');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const MONO_FONT = "'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace";

  const AMBER = "rgba(224, 168, 82, 0.75)";
  const UP_TEXT = "rgba(88, 214, 151, 0.9)";
  const DOWN_TEXT = "rgba(235, 110, 110, 0.9)";
  const MID_LINE = "rgba(233, 236, 243, 0.35)";

  const ASK_HEAT = "35, 22, 24";
  const ASK_HOT  = "196, 96, 96";
  const BID_HEAT = "18, 30, 27";
  const BID_HOT  = "74, 176, 126";

  function heatColor(base, hot, t) {
    const b = base.split(",").map(Number);
    const h = hot.split(",").map(Number);
    const r = b[0] + (h[0] - b[0]) * t;
    const g = b[1] + (h[1] - b[1]) * t;
    const bl = b[2] + (h[2] - b[2]) * t;
    return "rgb(" + (r | 0) + "," + (g | 0) + "," + (bl | 0) + ")";
  }

  const SYMBOL_DEFS = [
    { label: "XLM/USDT", base: 0.1234, tick: 0.0001, prec: 4 },
    { label: "SOL/USDT", base: 176.32, tick: 0.02,   prec: 2 },
    { label: "XRP/USDT", base: 1.0899, tick: 0.0001, prec: 4 },
    { label: "ADA/USDT", base: 0.612,  tick: 0.0002, prec: 4 },
  ];

  const TARGET_ROW_H = 15; // rows are re-derived from panel height so the price/qty text always tiles exactly
  let SYMBOLS = [];
  let LAYOUT = { orientation: "row", count: 4 };

  function buildSymbol(def, rowsHalf) {
    var bookByTick = {}, tradesByTick = {}, poc = null, pocVol = -1, cumDelta = 0;
    for (var i = -rowsHalf; i <= rowsHalf; i++) {
      var lvl = def.base + i * def.tick;
      if (i !== 0) {
        var bid = i < 0 ? Math.random() * 55 + 4 : 0;
        var ask = i > 0 ? Math.random() * 55 + 4 : 0;
        bookByTick[lvl] = { bid: bid, ask: ask };
      }
      var buy = Math.random() * 30 * Math.random();
      var sell = Math.random() * 30 * Math.random();
      tradesByTick[lvl] = { buy: buy, sell: sell };
      cumDelta += buy - sell;
      var total = buy + sell;
      if (total > pocVol) { pocVol = total; poc = lvl; }
    }
    return {
      label: def.label, tick: def.tick, prec: def.prec,
      bookByTick: bookByTick, tradesByTick: tradesByTick,
      cumDelta: cumDelta, poc: poc, pocVol: pocVol,
      bestBid: def.base - def.tick, bestAsk: def.base + def.tick,
      rowsHalf: rowsHalf,
      live: false
    };
  }

  function fmtQty(v) {
    if (v >= 1000) return (v / 1000).toFixed(1) + "k";
    if (v >= 10) return v.toFixed(1);
    return v.toFixed(2);
  }

  var COLS = [
    { key: "flow", w: 0.22, align: "center" },
    { key: "bid", w: 0.18, align: "right" },
    { key: "price", w: 0.16, align: "center" },
    { key: "ask", w: 0.22, align: "left" },
    { key: "cvd", w: 0.22, align: "center" }
  ];

  function drawPanel(sym, rect) {
    var x0 = rect.x, y0 = rect.y, panelW = rect.w, panelH = rect.h;
    var headerH = Math.max(20, panelH * 0.09), colHeadH = Math.max(9, panelH * 0.04);

    ctx.save();
    ctx.beginPath();
    ctx.rect(x0, y0, panelW, panelH);
    ctx.clip();

    ctx.fillStyle = "rgba(10, 12, 18, 0.35)";
    ctx.fillRect(x0, y0, panelW, panelH);
    ctx.strokeStyle = "rgba(224, 168, 82, 0.16)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x0 + 0.5, y0 + 0.5, panelW - 1, panelH - 1);

    ctx.fillStyle = "rgba(224, 168, 82, 0.09)";
    ctx.fillRect(x0, y0, panelW, headerH);
    ctx.fillStyle = AMBER;
    ctx.fillRect(x0, y0, 2, headerH);

    ctx.textAlign = "left";
    ctx.font = "bold 11px " + MONO_FONT;
    ctx.fillStyle = "rgba(233, 236, 243, 0.85)";
    ctx.fillText(sym.label, x0 + 8, y0 + 13);
    ctx.font = "8px " + MONO_FONT;
    ctx.fillStyle = "rgba(166, 175, 194, 0.5)";
    ctx.fillText("○ SIM", x0 + 8, y0 + 25);

    ctx.textAlign = "right";
    ctx.font = "bold 10px " + MONO_FONT;
    ctx.fillStyle = sym.cumDelta >= 0 ? UP_TEXT : DOWN_TEXT;
    ctx.fillText((sym.cumDelta >= 0 ? "Δ +" : "Δ ") + fmtQty(Math.abs(sym.cumDelta)), x0 + panelW - 8, y0 + 13);

    var totalBid = 0, totalAsk = 0;
    Object.keys(sym.bookByTick).forEach(function (k) {
      totalBid += sym.bookByTick[k].bid;
      totalAsk += sym.bookByTick[k].ask;
    });
    var imb = totalBid + totalAsk > 0 ? totalBid / (totalBid + totalAsk) : 0.5;
    ctx.font = "8px " + MONO_FONT;
    ctx.fillStyle = "rgba(166, 175, 194, 0.55)";
    ctx.fillText("IMB " + (imb * 100).toFixed(0) + "% BID", x0 + panelW - 8, y0 + 25);

    var colX = [];
    var cursor = x0;
    COLS.forEach(function (c) { colX.push(cursor); cursor += c.w * panelW; });

    ["FLOW Δ", "BID", "PRICE", "ASK", "CVD"].forEach(function (label, i) {
      ctx.font = "8px " + MONO_FONT;
      ctx.textAlign = COLS[i].align === "left" ? "left" : COLS[i].align === "right" ? "right" : "center";
      var tx = COLS[i].align === "right" ? colX[i] + COLS[i].w * panelW - 4
        : COLS[i].align === "left" ? colX[i] + 4
        : colX[i] + (COLS[i].w * panelW) / 2;
      ctx.fillStyle = "rgba(166, 175, 194, 0.4)";
      ctx.fillText(label, tx, y0 + headerH + colHeadH - 3);
    });

    var rowsHalf = sym.rowsHalf;
    var digits = sym.prec;
    var rowsTop = y0 + headerH + colHeadH;
    var rowsH = panelH - headerH - colHeadH;
    var rowCount = rowsHalf * 2 + 1;
    var rowH = rowsH / rowCount;
    var fontPx = rowH < 15 ? 8 : 9.5;

    var maxBook = 1e-9, maxFlow = 1e-9;
    for (var i0 = -rowsHalf; i0 <= rowsHalf; i0++) {
      var lvl0 = sym.bestBid + sym.tick + i0 * sym.tick;
      var book0 = sym.bookByTick[lvl0];
      if (book0) { if (book0.bid > maxBook) maxBook = book0.bid; if (book0.ask > maxBook) maxBook = book0.ask; }
      var t0 = sym.tradesByTick[lvl0];
      if (t0) { var d0 = Math.abs(t0.buy - t0.sell); if (d0 > maxFlow) maxFlow = d0; }
    }

    var cvdByOffset = {};
    var runningCvd = 0;
    var maxAbsCvd = 1e-9;
    for (var iC = -rowsHalf; iC <= rowsHalf; iC++) {
      var lvlC = sym.bestBid + sym.tick + iC * sym.tick;
      var tC = sym.tradesByTick[lvlC];
      runningCvd += tC ? tC.buy - tC.sell : 0;
      cvdByOffset[iC] = runningCvd;
      if (Math.abs(runningCvd) > maxAbsCvd) maxAbsCvd = Math.abs(runningCvd);
    }

    for (var i = -rowsHalf; i <= rowsHalf; i++) {
      var lvl = sym.bestBid + sym.tick + i * sym.tick;
      var ry = rowsTop + (i + rowsHalf) * rowH;
      var isMid = i === 0;
      var isPoc = sym.poc === lvl;

      if (isMid) {
        ctx.fillStyle = "rgba(224, 168, 82, 0.1)";
        ctx.fillRect(x0, ry, panelW, rowH - 1);
      } else if ((i + rowsHalf) % 2 === 0) {
        ctx.fillStyle = "rgba(233, 236, 243, 0.02)";
        ctx.fillRect(x0, ry, panelW, rowH - 1);
      }

      var book = sym.bookByTick[lvl];
      var bidSize = book ? book.bid : 0;
      var askSize = book ? book.ask : 0;
      var flow = sym.tradesByTick[lvl];
      var flowDelta = flow ? flow.buy - flow.sell : 0;

      var flowT = Math.min(1, Math.abs(flowDelta) / maxFlow);
      ctx.fillStyle = flowDelta >= 0 ? heatColor(BID_HEAT, BID_HOT, flowT * 0.7) : heatColor(ASK_HEAT, ASK_HOT, flowT * 0.7);
      ctx.fillRect(colX[0] + 2, ry + 1, COLS[0].w * panelW - 4, rowH - 3);
      if (flow) {
        ctx.font = fontPx + "px " + MONO_FONT;
        ctx.textAlign = "center";
        ctx.fillStyle = flowDelta >= 0 ? UP_TEXT : DOWN_TEXT;
        ctx.fillText((flowDelta >= 0 ? "+" : "") + fmtQty(flowDelta), colX[0] + (COLS[0].w * panelW) / 2, ry + rowH - rowH * 0.3);
      }

      var bidT = bidSize / maxBook;
      ctx.fillStyle = heatColor(BID_HEAT, BID_HOT, bidT);
      ctx.fillRect(colX[1], ry + 1, COLS[1].w * panelW - 2, rowH - 3);
      if (bidSize > 0) {
        ctx.font = fontPx + "px " + MONO_FONT;
        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(195, 255, 205, 0.9)";
        ctx.fillText(fmtQty(bidSize), colX[1] + COLS[1].w * panelW - 5, ry + rowH - rowH * 0.3);
      }

      var askT = askSize / maxBook;
      ctx.fillStyle = heatColor(ASK_HEAT, ASK_HOT, askT);
      ctx.fillRect(colX[3], ry + 1, COLS[3].w * panelW - 2, rowH - 3);
      if (askSize > 0) {
        ctx.font = fontPx + "px " + MONO_FONT;
        ctx.textAlign = "left";
        ctx.fillStyle = "rgba(255, 200, 195, 0.9)";
        ctx.fillText(fmtQty(askSize), colX[3] + 5, ry + rowH - rowH * 0.3);
      }

      ctx.font = (isMid ? "bold " : "") + fontPx + "px " + MONO_FONT;
      ctx.textAlign = "center";
      ctx.fillStyle = isMid ? AMBER : "rgba(233, 236, 243, 0.75)";
      ctx.fillText(lvl.toFixed(digits), colX[2] + (COLS[2].w * panelW) / 2, ry + rowH - rowH * 0.3);
      if (isPoc) {
        ctx.strokeStyle = AMBER;
        ctx.lineWidth = 1.25;
        ctx.strokeRect(colX[2] + 2, ry + 1.5, COLS[2].w * panelW - 4, rowH - 4);
      }

      var cvd = cvdByOffset[i];
      var cvdT = Math.min(1, Math.abs(cvd) / maxAbsCvd);
      ctx.fillStyle = cvd >= 0 ? heatColor(BID_HEAT, BID_HOT, cvdT * 0.6) : heatColor(ASK_HEAT, ASK_HOT, cvdT * 0.6);
      ctx.fillRect(colX[4] + 2, ry + 1, COLS[4].w * panelW - 4, rowH - 3);
      ctx.font = fontPx + "px " + MONO_FONT;
      ctx.textAlign = "center";
      ctx.fillStyle = cvd >= 0 ? UP_TEXT : DOWN_TEXT;
      ctx.fillText((cvd >= 0 ? "+" : "") + fmtQty(cvd), colX[4] + (COLS[4].w * panelW) / 2, ry + rowH - rowH * 0.3);
    }

    ctx.strokeStyle = MID_LINE;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x0, rowsTop + rowsHalf * rowH);
    ctx.lineTo(x0 + panelW, rowsTop + rowsHalf * rowH);
    ctx.stroke();

    ctx.strokeStyle = "rgba(10, 12, 18, 0.4)";
    for (var r = 0; r <= rowCount; r++) {
      var ly = rowsTop + r * rowH;
      ctx.beginPath();
      ctx.moveTo(x0, ly + 0.5);
      ctx.lineTo(x0 + panelW, ly + 0.5);
      ctx.stroke();
    }
    [1, 2, 3, 4].forEach(function (i) {
      ctx.beginPath();
      ctx.moveTo(colX[i] + 0.5, rowsTop);
      ctx.lineTo(colX[i] + 0.5, rowsTop + rowCount * rowH);
      ctx.strokeStyle = "rgba(224, 168, 82, 0.1)";
      ctx.stroke();
    });

    ctx.restore();
  }

  // Panel-count picker: try 4 side-by-side panels; if the FLOW/BID/PRICE/
  // ASK/CVD sub-columns would be too narrow for their own numbers at that
  // width, drop to 3; if 3 still collides, fall back to stacking the
  // panels vertically (full card width per panel, so the column-width
  // constraint disappears).
  function rowsHalfFor(panelH) {
    var headerH = Math.max(20, panelH * 0.09), colHeadH = Math.max(9, panelH * 0.04);
    var availableRows = panelH - headerH - colHeadH;
    return Math.max(5, Math.floor(availableRows / (2 * TARGET_ROW_H)));
  }
  function fontPxFor(panelH, rowsHalf) {
    var headerH = Math.max(20, panelH * 0.09), colHeadH = Math.max(9, panelH * 0.04);
    var rowH = (panelH - headerH - colHeadH) / (rowsHalf * 2 + 1);
    return rowH < 15 ? 8 : 9.5;
  }
  function columnsFit(panelW, fontPx) {
    ctx.font = fontPx + "px " + MONO_FONT;
    var flowW = ctx.measureText("+300.0").width + 10;
    var bidAskW = ctx.measureText("59.0").width + 10;
    var priceW = ctx.measureText("176.32").width + 6;
    var need = { flow: flowW, bid: bidAskW, price: priceW, ask: bidAskW, cvd: flowW };
    return COLS.every(function (c) { return c.w * panelW >= need[c.key]; });
  }

  let W, H;
  var MOBILE_QUERY = window.matchMedia('(max-width: 640px), (max-aspect-ratio: 3/4), (max-height: 500px) and (orientation: landscape)');
  function computeLayout() {
    var candidates = MOBILE_QUERY.matches
      ? [{ orientation: "col", count: 4 }]
      : [
          { orientation: "row", count: 4 },
          { orientation: "row", count: 3 },
          { orientation: "col", count: 3 }
        ];
    for (var i = 0; i < candidates.length; i++) {
      var cand = candidates[i];
      var panelW = cand.orientation === "row" ? W / cand.count : W;
      var panelH = cand.orientation === "row" ? H : H / cand.count;
      var rowsHalf = rowsHalfFor(panelH);
      var fontPx = fontPxFor(panelH, rowsHalf);
      if (cand.orientation === "col" || columnsFit(panelW, fontPx)) {
        return { orientation: cand.orientation, count: cand.count, rowsHalf: rowsHalf };
      }
    }
  }

  function resize() {
    W = canvas.parentElement.clientWidth;
    H = canvas.parentElement.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    LAYOUT = computeLayout();
    SYMBOLS = SYMBOL_DEFS.slice(0, LAYOUT.count).map(function (def) {
      return buildSymbol(def, LAYOUT.rowsHalf);
    });
  }
  window.addEventListener("resize", function () { resize(); draw(); });

  function draw() {
    ctx.clearRect(0, 0, W, H);
    var isRow = LAYOUT.orientation === "row";
    var panelW = isRow ? W / SYMBOLS.length : W;
    var panelH = isRow ? H : H / SYMBOLS.length;
    SYMBOLS.forEach(function (sym, i) {
      var rect = isRow ? { x: i * panelW, y: 0, w: panelW, h: panelH } : { x: 0, y: i * panelH, w: panelW, h: panelH };
      drawPanel(sym, rect);
    });
  }

  function jitter(sym, intensity) {
    var p = intensity || 0.18;
    Object.keys(sym.bookByTick).forEach(function (k) {
      var cell = sym.bookByTick[k];
      if (cell.bid && Math.random() < p) cell.bid = Math.max(2, cell.bid + (Math.random() - 0.5) * 18);
      if (cell.ask && Math.random() < p) cell.ask = Math.max(2, cell.ask + (Math.random() - 0.5) * 18);
    });
    Object.keys(sym.tradesByTick).forEach(function (k) {
      var cell = sym.tradesByTick[k];
      if (Math.random() < p) cell.buy = Math.max(0, cell.buy + (Math.random() - 0.5) * 10);
      if (Math.random() < p) cell.sell = Math.max(0, cell.sell + (Math.random() - 0.5) * 10);
    });
    var cumDelta = 0, poc = null, pocVol = -1;
    Object.keys(sym.tradesByTick).forEach(function (k) {
      var cell = sym.tradesByTick[k];
      cumDelta += cell.buy - cell.sell;
      var total = cell.buy + cell.sell;
      if (total > pocVol) { pocVol = total; poc = Number(k); }
    });
    sym.cumDelta = cumDelta;
    sym.poc = poc;
    sym.pocVol = pocVol;
  }

  // Normal cadence changes only a handful of cells per tick (low intensity);
  // occasionally a short burst of rapid, higher-intensity ticks simulates a
  // flurry of order-flow activity before settling back to the calm pace.
  function scheduleTick() {
    setTimeout(function () {
      if (Math.random() < 0.15) {
        runBurst();
      } else {
        SYMBOLS.forEach(function (s) { jitter(s, 0.14 + Math.random() * 0.1); });
        draw();
        scheduleTick();
      }
    }, 800 + Math.random() * 400);
  }

  function runBurst() {
    var stepsLeft = 3 + Math.floor(Math.random() * 4);
    function step() {
      SYMBOLS.forEach(function (s) { jitter(s, 0.45 + Math.random() * 0.25); });
      draw();
      stepsLeft--;
      if (stepsLeft > 0) setTimeout(step, 100 + Math.random() * 100);
      else scheduleTick();
    }
    step();
  }

  resize();
  draw();
  scheduleTick();

  // ---- page background network, ported directly from the homepage's
  // signal-widget.js: nodes drift and bounce off the viewport edges, edges
  // are rebuilt every frame from live distance, and "traveler" pulses hop
  // node-to-node at a constant on-screen speed (not tied to hop length)
  // until they've made a few hops, then despawn. Sits behind the card, on
  // the page's black background — the card overlays it, it never renders
  // inside the card itself. ----
  (function () {
    const canvas = document.getElementById('network');
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    let W, H;
    let LINK_DIST = 150;
    const TRAVELER_COUNT = 7;
    const PULSE_PX_PER_MS = 0.16;

    const NODE_COLOR = 'rgba(28, 38, 58, 0.4)';
    const LINK_COLOR = 'rgba(44, 85, 184, 0.22)';
    const PULSE_COLOR = 'rgba(26, 156, 120, 0.9)';

    let nodes = [];
    let travelers = [];
    let links = [];
    let lastTs = null;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      LINK_DIST = Math.max(150, Math.min(W, H) * 0.24);
    }

    function seedNodes() {
      const nodeCount = Math.max(40, Math.floor((W * H) / 20000));
      nodes = [];
      for (let i = 0; i < nodeCount; i++) {
        nodes.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.32,
          vy: (Math.random() - 0.5) * 0.32,
          r: 1.2 + Math.random() * 1.5,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function rebuildLinks() {
      links = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK_DIST) links.push({ a: nodes[i], b: nodes[j], dist: dist });
        }
      }
    }

    function neighborsOf(node, exclude) {
      const out = [];
      links.forEach(function (l) {
        if (l.a === node && l.b !== exclude) out.push(l.b);
        else if (l.b === node && l.a !== exclude) out.push(l.a);
      });
      return out;
    }

    function spawnTraveler() {
      const start = nodes[(Math.random() * nodes.length) | 0];
      const options = neighborsOf(start, null);
      if (!options.length) return null;
      const next = options[(Math.random() * options.length) | 0];
      return { from: start, to: next, t: 0, hopsRemaining: 2 + ((Math.random() * 3) | 0) };
    }

    function step(now) {
      const dt = lastTs == null ? 16 : Math.min(now - lastTs, 64);
      lastTs = now;

      nodes.forEach(function (n) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > W) n.vx *= -1;
        if (n.y < 0 || n.y > H) n.vy *= -1;
      });
      rebuildLinks();

      while (travelers.length < TRAVELER_COUNT) {
        const t = spawnTraveler();
        if (!t) break;
        travelers.push(t);
      }

      travelers.forEach(function (tr) {
        const dx = tr.to.x - tr.from.x, dy = tr.to.y - tr.from.y;
        const hopDist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        tr.t += (PULSE_PX_PER_MS * dt) / hopDist;
        if (tr.t >= 1) {
          tr.hopsRemaining -= 1;
          if (tr.hopsRemaining <= 0) { tr.dead = true; return; }
          let options = neighborsOf(tr.to, tr.from);
          if (!options.length) options = neighborsOf(tr.to, null);
          if (!options.length) { tr.dead = true; return; }
          tr.from = tr.to;
          tr.to = options[(Math.random() * options.length) | 0];
          tr.t = 0;
        }
      });
      travelers = travelers.filter(function (tr) { return !tr.dead; });

      ctx.clearRect(0, 0, W, H);

      links.forEach(function (l) {
        ctx.strokeStyle = LINK_COLOR;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(l.a.x, l.a.y);
        ctx.lineTo(l.b.x, l.b.y);
        ctx.stroke();
      });

      travelers.forEach(function (tr) {
        const px = tr.from.x + (tr.to.x - tr.from.x) * tr.t;
        const py = tr.from.y + (tr.to.y - tr.from.y) * tr.t;
        ctx.fillStyle = PULSE_COLOR;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      nodes.forEach(function (n) {
        const twinkle = 0.85 + 0.15 * Math.sin(now / 1100 + n.phase);
        ctx.fillStyle = NODE_COLOR;
        ctx.globalAlpha = twinkle;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function loop(ts) {
      step(ts || performance.now());
      if (!reduceMotion) requestAnimationFrame(loop);
    }

    window.addEventListener('resize', function () {
      resize();
      seedNodes();
      travelers = [];
    });
    resize();
    seedNodes();

    if (!reduceMotion) requestAnimationFrame(loop);
    else step(performance.now());
  })();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
</head>
<body>
  <canvas id="candles" aria-hidden="true"></canvas>
  <div class="bg-grid" aria-hidden="true"></div>
  <div id="live-badge" class="live-badge" aria-hidden="true">
    <span class="live-dot"></span>
    <span id="live-symbol" class="live-label">CONNECTING&hellip;</span>
    <span id="live-price" class="live-price">&mdash;</span>
  </div>
  <div class="console-bar" aria-hidden="true">
    <span class="console-prompt">daan@leiden<span class="console-colon">:</span>~<span class="console-colon">$</span></span>
    <span id="console-text" class="console-text"></span><span class="console-caret">&#9608;</span>
  </div>
  <div class="wrap">
    <header class="site-header">
      <a class="site-title" href="{{ '/' | relative_url }}">Daan&nbsp;Zunnenberg<span class="cursor">_</span></a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>About</a>
        <a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>Research</a>
        <a href="{{ '/publications/' | relative_url }}" {% if page.url contains 'publications' %}class="active"{% endif %}>Publications</a>
        <a href="{{ '/experience/' | relative_url }}" {% if page.url contains 'experience' %}class="active"{% endif %}>Experience</a>
        <a href="{{ '/projects/' | relative_url }}" {% if page.url contains 'projects' %}class="active"{% endif %}>Projects</a>
        <a href="{{ '/contact/' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Contact</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="mailto:{{ site.email }}"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 4h20v16H2V4zm10 7L4 6v2l8 5 8-5V6l-8 5z"/></svg>Email</a>
        <span>&middot;</span>
        <a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener noreferrer"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.09 3.29 9.39 7.86 10.91.57.1.78-.25.78-.55v-2.15c-3.19.7-3.86-1.53-3.86-1.53-.52-1.34-1.28-1.7-1.28-1.7-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.33.95.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.79 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.41-5.25 5.7.41.36.78 1.08.78 2.18v3.24c0 .3.21.66.79.55A11.5 11.5 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5z"/></svg>GitHub</a>
        <span>&middot;</span>
        <a href="https://www.linkedin.com/in/{{ site.linkedin }}/" target="_blank" rel="noopener noreferrer"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.03-1.85-3.03-1.85 0-2.14 1.45-2.14 2.94v5.66H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.38-1.85 3.61 0 4.28 2.38 4.28 5.47v6.27zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/></svg>LinkedIn</a>
        <span>&middot;</span>
        <a href="https://scholar.google.com/citations?user={{ site.scholar }}" target="_blank" rel="noopener noreferrer"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 1 8l11 5 9-4.09V17h2V8L12 3zm-7 9.18V16c0 2.21 3.13 4 7 4s7-1.79 7-4v-3.82l-7 3.18-7-3.18z"/></svg>Scholar</a>
      </div>
      <div class="footer-note">
        &copy; {{ 'now' | date: "%Y" }} Daan Zunnenberg
        <span>&middot;</span>
        <span>Last updated {{ site.time | date: "%B %Y" }}</span>
      </div>
    </footer>
  </div>
  <script src="{{ '/assets/js/console-bar.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/candles.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/external-links.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/contact.js' | relative_url }}"></script>
</body>
</html>
